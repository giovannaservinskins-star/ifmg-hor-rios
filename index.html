<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>IFMG | Gestão de Horários</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        :root { --primary: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* Login */
        #login-screen { background: #fff; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 350px; text-align: center; }
        
        /* App */
        #app-screen { display: none; width: 100%; max-width: 900px; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 10px; }
        
        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        td, th { padding: 12px; border: 1px solid #eee; text-align: center; }
        .editable { width: 90%; padding: 6px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        
        /* Chat */
        .msg { background: #f1f8f3; padding: 12px; border-radius: 10px; margin: 10px 0; border-left: 5px solid var(--primary); position: relative; text-align: left; }
        .delete-btn { position: absolute; right: 10px; top: 10px; color: #dc3545; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: var(--primary);">Login</h2>
        <input type="text" id="username" placeholder="E-mail institucional">
        <input type="password" id="password" placeholder="Senha">
        <button onclick="realizarLogin()">Entrar</button>
    </div>

    <div id="app-screen">
        <h2>Quadro de Horários</h2>
        <select id="turma-selector" onchange="renderizarTabela()">
            <option value="1A">1º Ano A</option><option value="1B">1º Ano B</option>
            <option value="2A">2º Ano A</option><option value="2B">2º Ano B</option>
            <option value="3A">3º Ano A</option><option value="3B">3º Ano B</option>
        </select>
        
        <table>
            <thead><tr><th>Horário</th><th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th><th>Sex</th></tr></thead>
            <tbody id="schedule-body"></tbody>
        </table>
        <button id="save-btn" onclick="salvarAlteracoes()" style="display:none;">💾 Salvar Alterações</button>

        <div style="margin-top:40px; text-align:left;">
            <h3>💬 Mural de Avisos</h3>
            <input type="text" id="msg-input" placeholder="Escreva um aviso...">
            <button onclick="enviarMensagem()">Publicar</button>
            <div id="chat-list"></div>
        </div>
    </div>

<script>
    let user = { id: '', role: '' };
    const base = [
        ["07:30", "-", "-", "-", "-", "-"], ["09:40", "-", "-", "-", "-", "-"],
        ["11:00", "Almoço", "Almoço", "Almoço", "Almoço", "Almoço"],
        ["13:00", "-", "-", "-", "-", "-"], ["14:40", "-", "-", "-", "-", "-"]
    ];

    function realizarLogin() {
        user.id = document.getElementById('username').value;
        if(!user.id) return alert("Preencha o e-mail");
        user.role = user.id.endsWith('@ifmg.edu.br') ? 'teacher' : 'student';
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        if(user.role === 'teacher') document.getElementById('save-btn').style.display = 'block';
        renderizarTabela();
    }

    function renderizarTabela() {
        const turma = document.getElementById('turma-selector').value;
        const body = document.getElementById('schedule-body');
        body.innerHTML = '';
        const data = JSON.parse(localStorage.getItem('horario_' + turma)) || base;
        
        data.forEach((row, l) => {
            let tr = document.createElement('tr');
            row.forEach((cell, c) => {
                let td = document.createElement('td');
                if (c > 0 && cell !== "Almoço" && user.role === 'teacher') {
                    td.innerHTML = `<input class="editable" value="${cell}">`;
                } else {
                    td.innerText = cell;
                }
                tr.appendChild(td);
            });
            body.appendChild(tr);
        });
        renderizarChat();
    }

    function enviarMensagem() {
        const turma = document.getElementById('turma-selector').value;
        const msg = document.getElementById('msg-input').value;
        if(!msg) return;
        let chat = JSON.parse(localStorage.getItem('chat_' + turma) || '[]');
        chat.push({ user: user.id, text: msg });
        localStorage.setItem('chat_' + turma, JSON.stringify(chat));
        document.getElementById('msg-input').value = '';
        renderizarChat();
    }

    function renderizarChat() {
        const turma = document.getElementById('turma-selector').value;
        const list = document.getElementById('chat-list');
        const chat = JSON.parse(localStorage.getItem('chat_' + turma) || '[]');
        list.innerHTML = chat.map((m, index) => `
            <div class="msg"><b>${m.user}</b><br>${m.text}
            <span class="delete-btn" onclick="apagarMensagem(${index})">Apagar</span></div>
        `).join('');
    }

    function apagarMensagem(index) {
        const turma = document.getElementById('turma-selector').value;
        let chat = JSON.parse(localStorage.getItem('chat_' + turma) || '[]');
        chat.splice(index, 1);
        localStorage.setItem('chat_' + turma, JSON.stringify(chat));
        renderizarChat();
    }

    function salvarAlteracoes() { 
        const turma = document.getElementById('turma-selector').value;
        let novo = [];
        document.querySelectorAll('#schedule-body tr').forEach(tr => {
            let row = [];
            tr.querySelectorAll('td').forEach(td => row.push(td.querySelector('input') ? td.querySelector('input').value : td.innerText));
            novo.push(row);
        });
        localStorage.setItem('horario_' + turma, JSON.stringify(novo));
        alert("Alterações salvas com sucesso!");
    }
</script>
</body>
</html>
